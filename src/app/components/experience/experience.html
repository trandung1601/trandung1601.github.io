<section id="experience">
  <div class="wrap">
    <div class="shead" appReveal><div class="ey">Experience</div><h2>Where I&rsquo;ve worked</h2></div>
    <div class="xp" appReveal>
      <div class="role">{{ xp.role }}</div>
      <div class="org">{{ xp.org }}</div>
      <div class="when">{{ xp.when }}</div>
      <p class="intro">{{ xp.intro }}</p>
      <div class="tl-list">
        @for (item of xp.timeline; track item.period) {
          <div class="tl-item">
            <div class="tl-period">{{ item.period }}</div>
            <div class="tl-title">{{ item.title }}</div>
            <div class="tl-desc" [innerHTML]="item.description"></div>
          </div>
        }
      </div>
    </div>
  </div>
</section>

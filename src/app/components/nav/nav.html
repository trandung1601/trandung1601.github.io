<div class="nav" role="banner">
  <div class="wrap">
    <div class="brand">Tran Tien Dung<span>.</span></div>
    <div class="nav-right">
      <nav id="primary-nav" [class.open]="menuOpen()">
        @for (link of links; track link.href) {
          <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
        }
      </nav>
      <div class="nav-icons">
        @for (social of socials; track social.icon) {
          <a class="iconbtn" [href]="social.href" [attr.aria-label]="social.ariaLabel" [title]="social.title">
            <app-social-icon [name]="social.icon" />
          </a>
        }
      </div>
      <button
        type="button"
        class="nav-toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="primary-nav"
        aria-label="Toggle navigation menu">
        @if (menuOpen()) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        }
      </button>
    </div>
  </div>
</div>
